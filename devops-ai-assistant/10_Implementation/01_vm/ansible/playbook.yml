---
- name: Налаштування сервера для training-project
  hosts: all
  become: yes

  vars:
    app_user: training
    app_home: /home/training
    app_dir: /opt/training-app
    app_repo: "https://github.com/yumemiruru/devops-course.git"

  tasks:
    - name: Створити користувача для додатку
      user:
        name: "{{ app_user }}"
        shell: /bin/bash
        create_home: yes
        home: "{{ app_home }}"
        groups: []
        state: present

    - name: Встановити необхідні пакети
      apt:
        name:
          - git
          - python3
          - python3-pip
          - python3-venv
          - acl
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: yes

    - name: Додати користувача training до групи docker
      user:
        name: "{{ app_user }}"
        groups: docker
        append: yes

    - name: Створити директорію додатку
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Створити директорію для конфігурації
      file:
        path: "{{ app_home }}/.config"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0700'

    - name: Клонувати репозиторій training-project
      git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}"
        version: main
      become_user: "{{ app_user }}"

    - name: Створити файл .env
      copy:
        content: |
          PORT=5000
          POSTGRES_PASSWORD={{ db_password }}
        dest: "{{ app_dir }}/devops-ai-assistant/10_Implementation/01_vm/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'
      notify:
        - Restart training-app

    - name: Встановити Python-залежності додатку
      pip:
        requirements: "{{ app_dir }}/devops-ai-assistant/10_Implementation/01_vm/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: "python3 -m venv"
      become_user: "{{ app_user }}"

    - name: Скопіювати unit-файл сервісу
      copy:
        src: training-app.service
        dest: /etc/systemd/system/training-app.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart training-app

    - name: Активувати автозапуск сервісу
      systemd:
        name: training-app
        enabled: yes

    - name: Запустити сервіс
      systemd:
        name: training-app
        state: started

    - name: Запустити PostgreSQL контейнер
      command: docker compose up -d
      args:
        chdir: "{{ app_dir }}/devops-ai-assistant/10_Implementation/01_vm"

    - name: Скопіювати скрипт моніторингу
      copy:
        src: ../monitor.sh
        dest: "{{ app_dir }}/monitor.sh"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Переконатися, що лог-файл моніторингу існує
      file:
        path: "{{ app_dir }}/monitor.log"
        state: touch
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Скопіювати unit-файл monitor.service
      copy:
        src: ../monitor.service
        dest: /etc/systemd/system/monitor.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd

    - name: Скопіювати unit-файл monitor.timer
      copy:
        src: ../monitor.timer
        dest: /etc/systemd/system/monitor.timer
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd

    - name: Скопіювати конфігурацію logrotate для моніторингу
      copy:
        src: ../monitor-logrotate
        dest: /etc/logrotate.d/monitor
        owner: root
        group: root
        mode: '0644'

    - name: Активувати monitor.timer
      systemd:
        name: monitor.timer
        enabled: yes
        state: started

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart training-app
      systemd:
        name: training-app
        state: restarted